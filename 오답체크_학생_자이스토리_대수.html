<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="format-detection" content="telephone=no">
<title>오답 체크 (자이스토리_대수)</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    margin: 0;
    background: #f5f3ee;
    color: #2d2a24;
    line-height: 1.5;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 30px 20px 100px;
  }
  h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 22px;
    margin: 0 0 4px;
  }
  .header-sub {
    color: #8b8680;
    font-size: 13px;
    margin-bottom: 24px;
  }

  /* 이름 입력 화면 */
  .screen { display: none; }
  .screen.active { display: block; }
  .name-card {
    background: white;
    border: 1px solid #d9d4c8;
    border-radius: 10px;
    padding: 40px 32px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    text-align: center;
    margin-top: 40px;
  }
  .name-card h2 {
    font-family: 'Noto Serif KR', serif;
    font-size: 18px;
    margin: 0 0 8px;
  }
  .name-card p {
    color: #6b665e;
    font-size: 13px;
    margin: 0 0 24px;
  }
  .name-input {
    width: 100%;
    padding: 12px 14px;
    font-size: 16px;
    border: 1.5px solid #d9d4c8;
    border-radius: 8px;
    font-family: inherit;
    text-align: center;
    background: #faf8f3;
  }
  .name-input:focus {
    outline: none;
    border-color: #5d7a5b;
    background: white;
  }
  .btn {
    background: #5d7a5b;
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 16px;
    font-family: inherit;
  }
  .btn:hover { background: #4a6349; }
  .btn:disabled { background: #bfbbb2; cursor: not-allowed; }
  .btn.btn-lg { padding: 14px 32px; font-size: 15px; }
  .btn.btn-danger { background: #b85c5c; }
  .btn.btn-danger:hover { background: #9c4a4a; }

  .btn-mini {
    background: white;
    color: #5d7a5b;
    border: 1px solid #d9d4c8;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-mini:hover { border-color: #5d7a5b; background: #faf8f3; }

  /* 요약 바: 상단에 선택 개수 표시 */
  .summary-bar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: white;
    border: 1px solid #d9d4c8;
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .summary-bar b { color: #3d5a3b; font-size: 16px; }

  /* 아코디언 그룹 */
  .group.collapsible .group-header {
    cursor: pointer;
    transition: background 0.15s;
  }
  .group.collapsible .group-header:hover {
    background: #f0ece0;
  }
  .group-expand-icon {
    font-size: 14px;
    color: #8b8680;
    transition: transform 0.2s;
    flex-shrink: 0;
    margin-left: 8px;
  }
  .group.expanded .group-expand-icon {
    transform: rotate(90deg);
  }
  .group .problem-list {
    display: grid;  /* 항상 표시 (트리 부모가 펼침 제어) */
  }
  .group.collapsible .problem-list {
    display: none;  /* collapsible 클래스 있을 때만 접힘 (호환성) */
  }
  .group.collapsible.expanded .problem-list {
    display: grid;
  }
  .group-check-badge {
    display: inline-block;
    background: #5d7a5b;
    color: white;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 6px;
  }
  .group-check-badge.zero {
    display: none;
  }

  /* ===== 단원 트리 (대단원/중단원/소단원) ===== */
  .unit-node {
    margin-bottom: 8px;
  }
  .unit-node.unit-level-1 {
    background: white;
    border: 1px solid #d9d4c8;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .unit-node.unit-level-2,
  .unit-node.unit-level-3 {
    margin: 6px 12px 6px 12px;
    border-radius: 8px;
    background: #faf8f3;
    border: 1px solid #e5e0d3;
    overflow: hidden;
  }
  .unit-node.unit-level-3 {
    background: #f4f1e8;
  }
  .unit-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }
  .unit-node.unit-level-1 .unit-header {
    padding: 16px 18px;
  }
  .unit-node.unit-level-2 .unit-header {
    padding: 10px 14px;
  }
  .unit-node.unit-level-3 .unit-header {
    padding: 8px 12px;
  }
  .unit-header:hover {
    background: rgba(0,0,0,0.03);
  }
  .unit-header-content {
    flex: 1;
    min-width: 0;
  }
  .unit-title {
    font-size: 16px;
    font-weight: 600;
    color: #2a2520;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
  }
  .unit-node.unit-level-2 .unit-title {
    font-size: 14px;
    color: #3a3530;
  }
  .unit-node.unit-level-3 .unit-title {
    font-size: 13px;
    color: #4a4540;
    font-weight: 500;
  }
  .unit-expand-icon {
    color: #9a958e;
    font-size: 12px;
    transition: transform 0.2s;
    flex-shrink: 0;
    margin-left: 8px;
  }
  .unit-node.expanded > .unit-header .unit-expand-icon {
    transform: rotate(90deg);
  }
  .unit-body {
    display: none;
    padding-bottom: 8px;
  }
  .unit-node.expanded > .unit-body {
    display: block;
  }
  .unit-check-badge {
    display: inline-block;
    background: #5d7a5b;
    color: white;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 8px;
  }
  .unit-check-badge.zero {
    display: none;
  }

  /* 트리 안의 group은 들여쓰기 + 박스 약화 */
  .unit-body .group {
    margin: 4px 12px 8px 12px;
    border: 1px dashed #d9d4c8;
    background: #fff;
  }
  .unit-body .unit-body .group {
    margin: 4px 8px 6px 8px;
  }

  /* 체크 화면 */
  .group {
    background: white;
    border: 1px solid #d9d4c8;
    border-radius: 10px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .group-header {
    padding: 12px 16px;
    border-bottom: 1px solid #ebe6db;
    background: #faf8f3;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .group-header-content {
    flex: 1;
    min-width: 0;
  }
  .group-select-all {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: white;
    border: 1px solid #d9d4c8;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    user-select: none;
  }
  .group-select-all:hover { border-color: #5d7a5b; }
  .group-select-all input {
    margin: 0;
    accent-color: #5d7a5b;
  }
  .group-select-all.all-checked {
    background: #e8f0e5;
    border-color: #5d7a5b;
    color: #3d5a3b;
  }
  .group-subject {
    font-size: 11px;
    color: #8b8680;
    margin-bottom: 2px;
  }
  .group-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 15px;
    font-weight: 600;
  }
  .group-path {
    font-size: 12px;
    color: #6b665e;
    margin-top: 2px;
  }
  .problem-list {
    padding: 12px 16px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 8px;
  }
  .problem-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: #faf8f3;
    border: 1px solid #ebe6db;
    border-radius: 6px;
    cursor: pointer;
    user-select: none;
    font-size: 13px;
    transition: all 0.1s;
  }
  .problem-item:hover { border-color: #bfbbb2; }
  .problem-item.checked {
    background: #e8f0e5;
    border-color: #5d7a5b;
    color: #3d5a3b;
  }
  .problem-item input[type="checkbox"] {
    margin: 0;
    width: 16px;
    height: 16px;
    accent-color: #5d7a5b;
    flex-shrink: 0;
  }
  .problem-num {
    flex: 1;
    min-width: 0;
    overflow-wrap: anywhere;
  }
  .problem-diff {
    font-size: 10px;
    color: #8b8680;
    flex-shrink: 0;
  }

  /* 하단 의견 + 제출 */
  .bottom-section {
    margin-top: 30px;
    padding: 20px;
    background: white;
    border: 1px solid #d9d4c8;
    border-radius: 10px;
  }
  .comment-box {
    width: 100%;
    min-height: 100px;
    padding: 12px;
    font-size: 13px;
    border: 1px solid #d9d4c8;
    border-radius: 6px;
    font-family: inherit;
    resize: vertical;
    background: #faf8f3;
    color: #2d2a24;
  }
  .comment-box.placeholder { color: #a8a39a; }
  .comment-box:focus {
    outline: none;
    border-color: #5d7a5b;
    background: white;
  }

  .submit-bar {
    margin-top: 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .submit-info {
    font-size: 13px;
    color: #6b665e;
  }
  .submit-info b { color: #3d5a3b; font-size: 16px; }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #2d2a24;
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; }

  /* 모바일 최적화 */
  @media (max-width: 600px) {
    .container { padding: 20px 14px 100px; }
    h1 { font-size: 18px; }
    .name-card { padding: 28px 20px; margin-top: 20px; }
    .name-card h2 { font-size: 16px; }
    .problem-list {
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 6px;
    }
    .problem-item {
      padding: 10px 12px;
      font-size: 14px;
    }
    .problem-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
    }
    .group-header {
      padding: 14px;
      flex-direction: column;
      gap: 10px;
      align-items: stretch;
    }
    .group-select-all {
      align-self: flex-end;
      padding: 8px 14px;
      font-size: 13px;
    }
    .group-select-all input {
      width: 18px;
      height: 18px;
    }
    .submit-bar {
      flex-direction: column;
      align-items: stretch;
    }
    .submit-bar .btn {
      width: 100%;
    }
    .comment-box {
      min-height: 120px;
      font-size: 14px;
    }
  }
</style>
</head>

</div>

window.addEventListener('error', function(e) {
  try {
    var b = document.getElementById('errorBanner');
    if (b) {
      b.style.display = 'block';
      b.innerHTML = '⚠️ 스크립트 오류: ' + (e.message || e.error || '알 수 없음') +
        '<br><b>카카오톡 내장 브라우저에서 발생한 문제일 수 있어요.</b>' +
        '<br>오른쪽 위 메뉴(⋯ 또는 ⋮)를 눌러서 <b>"다른 브라우저로 열기"</b>를 선택해주세요.';
    }
  } catch (ignore) {}
});
window.addEventListener('unhandledrejection', function(e) {
  try {
    var b = document.getElementById('errorBanner');
    if (b) {
      b.style.display = 'block';
      b.textContent = '⚠️ 오류: ' + (e.reason && e.reason.message ? e.reason.message : e.reason);
    }
  } catch (ignore) {}

}

function renderCheckScreen() {
  var titleEl = document.getElementById('checkTitle');
  if (titleEl) titleEl.textContent = DATA.studentName + ' 학생의 오답 체크';

  var container = document.getElementById('groupsContainer');
  if (!container) return;
  container.innerHTML = '';
  groupItemRegistry = {};

  if (DATA.groups.length === 0) {
    container.innerHTML = '<div style="background:#fef3e5;padding:20px;border-radius:8px;text-align:center;color:#8a5a1a;">문제가 없습니다.</div>';
    return;
  }

  // 그룹들을 단원 트리로 변환: unit1 → unit2 → unit3 → problems
  var tree = buildUnitTree(DATA.groups);
  // 트리를 화면에 렌더
  renderUnitTree(container, tree, 1);
  updateSummary();
}

// 평면 그룹 배열 → 단원 트리 구조
function buildUnitTree(groups) {
  // tree 구조: { name, level, children: [], groups: [] (terminal에서만) }
  var roots = [];
  var rootMap = {};

  for (var gi = 0; gi < groups.length; gi++) {
    var g = groups[gi];
    var u1 = g.unit1 || '(단원 미지정)';
    var u2 = g.unit2 || '';
    var u3 = g.unit3 || '';

    // 레벨1
    if (!rootMap[u1]) {
      var node1 = { name: u1, level: 1, children: [], childMap: {}, groupIndices: [] };
      rootMap[u1] = node1;
      roots.push(node1);
    }
    var n1 = rootMap[u1];

    if (!u2) {
      // 중단원 없음 → 대단원에 직접 그룹 매달기
      n1.groupIndices.push(gi);
      continue;
    }

    // 레벨2
    if (!n1.childMap[u2]) {
      var node2 = { name: u2, level: 2, children: [], childMap: {}, groupIndices: [] };
      n1.childMap[u2] = node2;
      n1.children.push(node2);
    }
    var n2 = n1.childMap[u2];

    if (!u3) {
      // 소단원 없음 → 중단원에 직접 그룹 매달기
      n2.groupIndices.push(gi);
      continue;
    }

    // 레벨3
    if (!n2.childMap[u3]) {
      var node3 = { name: u3, level: 3, children: [], childMap: {}, groupIndices: [] };
      n2.childMap[u3] = node3;
      n2.children.push(node3);
    }
    var n3 = n2.childMap[u3];
    n3.groupIndices.push(gi);
  }

  return roots;
}

// 트리를 재귀적으로 렌더
function renderUnitTree(container, nodes, level) {
  for (var i = 0; i < nodes.length; i++) {
    var node = nodes[i];
    buildUnitNode(container, node);
  }
}

// 한 단원 노드를 빌드 (재귀적으로 자식 포함)
function buildUnitNode(container, node) {
  var nodeEl = document.createElement('div');
  nodeEl.className = 'unit-node unit-level-' + node.level + ' collapsible';
  // 대단원은 기본적으로 펼친 상태로 (중단원 보임)
  if (node.level === 1) {
    nodeEl.classList.add('expanded');
  }

  // 헤더
  var header = document.createElement('div');
  header.className = 'unit-header';

  // 헤더 클릭으로 펼침/접힘
  var titleHtml =
    '<div class="unit-title">' + escapeHtml(node.name) +
    '<span class="unit-check-badge zero">0</span>' +
    '</div>';
  header.innerHTML =
    '<div class="unit-header-content">' + titleHtml + '</div>' +
    '<span class="unit-expand-icon">▶</span>';

  nodeEl.appendChild(header);

  // 자식 컨테이너
  var body = document.createElement('div');
  body.className = 'unit-body';
  nodeEl.appendChild(body);

  // 헤더 클릭 → 토글
  header.addEventListener('click', function() {
    nodeEl.classList.toggle('expanded');
  });

  // 자식 단원이 있으면 재귀
  if (node.children.length > 0) {
    renderUnitTree(body, node.children, node.level + 1);
  }

  // 직접 매달린 그룹들 (자식이 없는 단계의 단원)
  for (var gi = 0; gi < node.groupIndices.length; gi++) {
    var gIdx = node.groupIndices[gi];
    var g = DATA.groups[gIdx];
    buildGroupCard(body, g, gIdx);
  }

  // 배지 업데이트를 위해 노드 등록
  if (!window.unitNodeRegistry) window.unitNodeRegistry = [];
  window.unitNodeRegistry.push({ el: nodeEl, node: node });

  container.appendChild(nodeEl);
}

function updateSummary() {
  var count = 0;
  for (var id in checkedIds) { if (checkedIds[id]) count++; }
  var el = document.getElementById('summaryCount');
  if (el) el.textContent = count;
  var el2 = document.getElementById('checkedCount');
  if (el2) el2.textContent = count;
}

function collapseAllUnits() {
  // 트리 노드들 모두 접기
  var unitNodes = document.querySelectorAll('.unit-node.collapsible');
  for (var i = 0; i < unitNodes.length; i++) {
    unitNodes[i].classList.remove('expanded');
  }
  // 호환성: 기존 구조의 .group.collapsible도 접기
  var groups = document.querySelectorAll('.group.collapsible');
  for (var j = 0; j < groups.length; j++) {
    groups[j].classList.remove('expanded');
  }
}

function buildGroupCard(container, g, gIdx) {
  var groupEl = document.createElement('div');
  groupEl.className = 'group';  // collapsible 제거 (이제 트리 부모가 펼침 처리)

  // 헤더 (간단하게 - 과목·교재만 표시, 단원 정보는 부모에 있음)
  var contentHtml = '';
  var sbParts = [];
  if (g.subject) sbParts.push(g.subject);
  if (g.book) sbParts.push(g.book);
  if (sbParts.length > 0) {
    contentHtml += '<div class="group-subject">' + escapeHtml(sbParts.join(' · ')) + '</div>';
  }
  contentHtml +=
    '<div class="group-title">문제 목록' +
    '<span class="group-check-badge zero" data-badge-idx="' + gIdx + '">0</span>' +
    '</div>';

  var headerEl = document.createElement('div');
  headerEl.className = 'group-header';
  headerEl.innerHTML =
    '<div class="group-header-content">' + contentHtml + '</div>' +
    '<label class="group-select-all" data-group-idx="' + gIdx + '">' +
      '<input type="checkbox" class="group-all-cb">' +
      '<span>모두</span>' +
    '</label>';
  groupEl.appendChild(headerEl);

  // 문제 목록 (항상 펼친 상태로)
  var listEl = document.createElement('div');
  listEl.className = 'problem-list';
  var itemsInGroup = [];

  for (var i = 0; i < g.problems.length; i++) {
    (function(p) {
      var item = document.createElement('label');
      item.className = 'problem-item';
      item.innerHTML =
        '<input type="checkbox" data-id="' + escapeAttr(p.id) + '">' +
        '<span class="problem-num">' + escapeHtml(p.num || '(번호없음)') + '</span>' +
        (p.diff ? '<span class="problem-diff">' + escapeHtml(p.diff) + '</span>' : '');
      var cb = item.querySelector('input');
      cb.addEventListener('change', function() {
        if (cb.checked) {
          if (!checkedIds[p.id]) { checkedIds[p.id] = true; checkedCount++; }
          item.classList.add('checked');
        } else {
          if (checkedIds[p.id]) { delete checkedIds[p.id]; checkedCount--; }
          item.classList.remove('checked');
        }
        updateCheckedCount();
        updateGroupAllState(gIdx);
        updateGroupBadge(gIdx);
        updateSummary();
      });
      listEl.appendChild(item);
      itemsInGroup.push({ cb: cb, item: item, id: p.id });
    })(g.problems[i]);
  }
  groupEl.appendChild(listEl);
  container.appendChild(groupEl);

  // 전체선택 핸들러
  var groupAllLabel = headerEl.querySelector('.group-select-all');
  var groupAllCb = headerEl.querySelector('.group-all-cb');
  groupAllCb.addEventListener('change', function() {
    var on = groupAllCb.checked;
    for (var j = 0; j < itemsInGroup.length; j++) {
      var it = itemsInGroup[j];
      it.cb.checked = on;
      if (on) {
        if (!checkedIds[it.id]) { checkedIds[it.id] = true; checkedCount++; }
        it.item.classList.add('checked');
      } else {
        if (checkedIds[it.id]) { delete checkedIds[it.id]; checkedCount--; }
        it.item.classList.remove('checked');
      }
    }
    groupAllLabel.classList.toggle('all-checked', on);
    updateCheckedCount();
    updateGroupBadge(gIdx);
    updateSummary();
  });
  // 전체선택 라벨 클릭이 아코디언 토글과 충돌하지 않도록
  groupAllLabel.addEventListener('click', function(e) { e.stopPropagation(); });

  groupItemRegistry[gIdx] = {
    itemsInGroup: itemsInGroup,
    groupAllLabel: groupAllLabel,
    groupAllCb: groupAllCb,
    groupEl: groupEl
  };
}

function updateGroupBadge(gIdx) {
  var reg = groupItemRegistry[gIdx];
  if (!reg) return;
  var count = 0;
  for (var i = 0; i < reg.itemsInGroup.length; i++) {
    if (reg.itemsInGroup[i].cb.checked) count++;
  }
  var badge = reg.groupEl.querySelector('.group-check-badge');
  if (badge) {
    badge.textContent = count;
    badge.classList.toggle('zero', count === 0);
  }
  // 부모 단원 노드들의 배지도 업데이트
  updateAllUnitBadges();
}

// 모든 단원 노드의 합계 배지 갱신
function updateAllUnitBadges() {
  if (!window.unitNodeRegistry) return;
  for (var i = 0; i < window.unitNodeRegistry.length; i++) {
    var reg = window.unitNodeRegistry[i];
    var total = countCheckedInUnit(reg.node);
    var badge = reg.el.querySelector(':scope > .unit-header .unit-check-badge');
    if (badge) {
      badge.textContent = total;
      badge.classList.toggle('zero', total === 0);
    }
  }
}

// 단원 노드에 속한 모든 체크 수 합산 (재귀)
function countCheckedInUnit(node) {
  var sum = 0;
  // 직접 매달린 그룹들
  for (var i = 0; i < node.groupIndices.length; i++) {
    var gIdx = node.groupIndices[i];
    var reg = groupItemRegistry[gIdx];
    if (reg) {
      for (var j = 0; j < reg.itemsInGroup.length; j++) {
        if (reg.itemsInGroup[j].cb.checked) sum++;
      }
    }
  }
  // 자식 노드들
  for (var k = 0; k < node.children.length; k++) {
    sum += countCheckedInUnit(node.children[k]);
  }
  return sum;
}

function updateGroupAllState(gIdx) {
  var reg = groupItemRegistry[gIdx];
  if (!reg) return;
  var allChecked = true;
  var anyChecked = false;
  for (var i = 0; i < reg.itemsInGroup.length; i++) {
    if (reg.itemsInGroup[i].cb.checked) anyChecked = true;
    else allChecked = false;
  }
  reg.groupAllCb.checked = allChecked;
  try { reg.groupAllCb.indeterminate = !allChecked && anyChecked; } catch (e) {}
  reg.groupAllLabel.classList.toggle('all-checked', allChecked);
}

// ===== 결과 파일 제출 =====
function submitFile() {
  var checkedIdList = Object.keys(checkedIds);
  if (checkedIdList.length === 0) {
    if (!confirm('체크한 문제가 없습니다. 그래도 제출하시겠습니까?')) return;
  }
  var commentBox = document.getElementById('commentBox');
  var comment = commentBox.classList.contains('placeholder') ? '' : commentBox.value.trim();

  // 체크된 문제들의 단원 자동 추출 (선생님 참고용)
  var checkedUnitsSet = {};  // key → 객체
  for (var ci = 0; ci < checkedIdList.length; ci++) {
    var pid = checkedIdList[ci];
    // DATA.groups 에서 해당 problem을 찾음
    for (var gi = 0; gi < DATA.groups.length; gi++) {
      var g = DATA.groups[gi];
      var found = false;
      for (var pi = 0; pi < g.problems.length; pi++) {
        if (String(g.problems[pi].id) === String(pid)) {
          var unitKey = (g.unit1 || '') + '|' + (g.unit2 || '') + '|' + (g.unit3 || '');
          if (!checkedUnitsSet[unitKey]) {
            checkedUnitsSet[unitKey] = {
              unit1: g.unit1 || '',
              unit2: g.unit2 || '',
              unit3: g.unit3 || '',
              count: 0
            };
          }
          checkedUnitsSet[unitKey].count++;
          found = true;
          break;
        }
      }
      if (found) break;
    }
  }
  var checkedUnits = [];
  for (var k in checkedUnitsSet) checkedUnits.push(checkedUnitsSet[k]);

  var now = new Date();
  var yyyy = now.getFullYear();
  var mm = String(now.getMonth() + 1);
  if (mm.length < 2) mm = '0' + mm;
  var dd = String(now.getDate());
  if (dd.length < 2) dd = '0' + dd;
  var dateStr = yyyy + mm + dd;

  var result = {
    type: 'wrong-note-submission',
    version: 2,
    studentName: DATA.studentName,
    suffix: DATA.suffix,
    submittedAt: now.toISOString(),
    originalCreatedAt: DATA.createdAt,
    checkedIds: checkedIdList,
    comment: comment,
    checkedUnits: checkedUnits
  };

  var safeName = (DATA.studentName || '학생').replace(/[\/\\:*?"<>|]/g, '_');
  var safeSuffix = DATA.suffix ? '_' + DATA.suffix.replace(/[\/\\:*?"<>|]/g, '_') : '';
  var filename = '오답제출_' + safeName + safeSuffix + '_' + dateStr + '.json';
  var jsonText = JSON.stringify(result, null, 2);

  // 모바일에서 Web Share API 시도
  var isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);

  try {
    if (isMobile && window.File && navigator.canShare) {
      var file = new File([jsonText], filename, { type: 'application/json' });
      if (navigator.canShare({ files: [file] })) {
        navigator.share({
          files: [file],
          title: '오답 제출 - ' + (DATA.studentName || ''),
          text: filename
        }).then(function() {
          showToast('공유 완료!');
        }).catch(function(err) {
          if (err && err.name === 'AbortError') return;
          fallbackDownload(jsonText, filename, isMobile);
        });
        return;
      }
    }
  } catch (e) {}

  fallbackDownload(jsonText, filename, isMobile);
}

function fallbackDownload(jsonText, filename, isMobile) {
  try {
    var blob = new Blob([jsonText], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
    showToast(isMobile ? '다운로드 완료! 선생님께 보내주세요' : '파일이 다운로드되었습니다');
  } catch (e) {
    // 최후 폴백: 텍스트를 화면에 보여주고 복사하도록
    var fallbackArea = document.createElement('div');
    fallbackArea.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:white;padding:20px;overflow:auto;z-index:99999;';
    fallbackArea.innerHTML =
      '<h2 style="margin-top:0;">⚠️ 다운로드가 안 되는 환경입니다</h2>' +
      '<p>아래 내용을 모두 선택해서 복사하고, 메모장에 붙여넣기 하여 ' + escapeHtml(filename) + ' 이름으로 저장해주세요.</p>' +
      '<button onclick="this.parentElement.remove()" style="margin-bottom:10px;">닫기</button>' +
      '<textarea readonly style="width:100%;height:60vh;font-family:monospace;font-size:11px;">' +
      escapeHtml(jsonText) + '</textarea>';
    document.body.appendChild(fallbackArea);
  }
}

// ===== 초기화 (DOMContentLoaded 대신 즉시 실행) =====
function init() {
  try {
    initNameScreen();
    initCommentBox();
    showScreen('name');
  } catch (e) {
    var b = document.getElementById('errorBanner');
    if (b) {
      b.style.display = 'block';
      b.textContent = '⚠️ 초기화 오류: ' + e.message;
    }
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
